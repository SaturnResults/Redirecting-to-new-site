<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://saturnresults.co.uk">
  <title>Saturn Results</title>
  
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
    }

    .section {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ffffff 0%, #a78bfa 50%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.1rem;
      color: #9ca3af;
      margin-bottom: 0.5rem;
    }

    .countdown {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 2.5rem;
    }

    .countdown span {
      color: #a78bfa;
      font-weight: 600;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.4rem;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <section class="section">
    <h1>Saturn Results</h1>
    <p>You are being redirected to our website.</p>
    <p class="countdown">Taking you there in <span id="timer">3</span> seconds…</p>
    <a href="https://saturnresults.co.uk" class="btn">Go Now &rarr;</a>
  </section>

  <script>
    let seconds = 3;
    const el = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = 'https://saturnresults.co.uk';
      }
    }, 1000);
  </script>
</body>
</html>
